<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Create an account for your Bootstrap 5 and Supabase marketplace app." />
  <title>MarketAI | Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body class="bg-body-tertiary">
  <div class="min-vh-100 d-flex flex-column">
    
    <header class="border-bottom bg-body shadow-sm">
      <div class="container py-3 d-flex justify-content-between align-items-center">
        <a class="text-decoration-none fw-bold text-primary fs-5" href="/index.html">🛒 MarketAI</a>
        <a class="btn btn-outline-secondary btn-sm" href="/index.html">🏠 Home</a>
      </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center py-5">
      <section class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <div class="card shadow border-0">
              <div class="card-body p-4 p-md-5">
                <p class="text-uppercase text-body-secondary small mb-2 fw-semibold">Get started</p>
                <h1 class="h3 fw-bold text-dark mb-3">Create your account</h1>
                <p class="text-body-secondary mb-4">
                  Register to set up your profile and explore community marketplace listings.
                </p>

                <form id="register-form">
                  <div class="mb-3">
                    <label for="fullName" class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="fullName" required placeholder="John Doe" />
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email address</label>
                    <input type="email" class="form-control form-control-lg" id="email" required placeholder="name@example.com" />
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required minlength="6" placeholder="******" />
                  </div>
                  
                  <button type="submit" class="btn btn-primary btn-lg w-100 mt-4 py-2 shadow-sm">
                    Create account
                  </button>
                  
                  <p class="text-body-secondary small text-center mb-0 mt-4">
                    Already have an account? <a href="/login.html" class="text-decoration-none fw-semibold">Sign in</a>
                  </p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/register.js"></script>
</body>
</html>
