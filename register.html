<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f172a" />
		<meta name="description" content="Create an account for your Bootstrap 5 and Supabase app." />
		<title>app-test | Register</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
		/>
	</head>
	<body class="bg-body-tertiary">
		<div class="min-vh-100 d-flex flex-column">
			<header class="border-bottom bg-body">
				<div class="container py-3">
					<a class="text-decoration-none fw-semibold text-body" href="/index.html">app-test</a>
				</div>
			</header>

			<main class="flex-grow-1 d-flex align-items-center py-5">
				<section class="container">
					<div class="row justify-content-center">
						<div class="col-12 col-md-10 col-lg-6">
							<div class="card shadow-sm border-0">
								<div class="card-body p-4 p-md-5">
									<p class="text-uppercase text-body-secondary small mb-2">Get started</p>
									<h1 class="h3 fw-semibold mb-3">Create your account.</h1>
									<p class="text-body-secondary mb-4">
										Register to set up Supabase auth, user profiles, and protected pages.
									</p>

									<form>
										<div class="row g-3">
											<div class="col-md-6">
												<label for="firstName" class="form-label">First name</label>
												<input type="text" class="form-control form-control-lg" id="firstName" />
											</div>
											<div class="col-md-6">
												<label for="lastName" class="form-label">Last name</label>
												<input type="text" class="form-control form-control-lg" id="lastName" />
											</div>
										</div>
										<div class="mb-3 mt-3">
											<label for="registerEmail" class="form-label">Email address</label>
											<input
												type="email"
												class="form-control form-control-lg"
												id="registerEmail"
												placeholder="name@example.com"
											/>
										</div>
										<div class="row g-3">
											<div class="col-md-6">
												<label for="registerPassword" class="form-label">Password</label>
												<input
													type="password"
													class="form-control form-control-lg"
													id="registerPassword"
												/>
											</div>
											<div class="col-md-6">
												<label for="confirmPassword" class="form-label">Confirm password</label>
												<input
													type="password"
													class="form-control form-control-lg"
													id="confirmPassword"
												/>
											</div>
										</div>
										<button type="submit" class="btn btn-primary btn-lg w-100 mt-4">
											Create account
										</button>
										<p class="text-body-secondary small text-center mb-0 mt-3">
											Already have an account? <a href="/login.html">Sign in</a>
										</p>
									</form>
								</div>
							</div>
						</div>
					</div>
				</section>
			</main>
		</div>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Marketplace Platform</title>
</head>
<body class="bg-light">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5">
        <div class="card shadow border-0 p-4">
          <div class="card-body">
            <h2 class="text-center mb-4 fw-bold text-primary">Create Account</h2>
            <form id="register-form">
              <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required placeholder="John Doe">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required minlength="6" placeholder="******">
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign Up</button>
            </form>
            <div class="text-center">
              <span class="text-muted">Already have an account?</span>
              <a href="/login.html" class="text-decoration-none">Login here</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/register.js"></script>
</body>
</html>
