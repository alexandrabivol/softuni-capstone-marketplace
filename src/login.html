<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketAI | Secure Gateway Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary fs-4" href="/index.html">🛒 MarketAI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-3 align-items-center">
          <li class="nav-item"><a class="nav-link fw-medium" href="/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="/register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-warning fw-semibold" href="/admin.html">🛡️ Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-auto py-5 flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="w-100" style="max-width: 440px;">
      
      <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="card-body p-4 p-md-5">
          
          <div class="text-center mb-4">
            <div class="fs-1 mb-2">🔐</div>
            <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
            <p class="text-muted small">Enter credentials to securely manage your marketplace gear</p>
          </div>

          <form autocomplete="off">
            
            <div class="mb-3">
              <label class="form-label text-secondary small fw-medium">Account Email Address</label>
              <input type="email" class="form-control py-2.5" placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label text-secondary small fw-medium mb-0">Secret Password</label>
              </div>
              <input type="password" class="form-control py-2.5" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fs-6 fw-semibold py-2.5 mb-3 shadow-sm">
              Sign In to Account
            </button>

          </form>

          <div class="text-center pt-2 border-top mt-4">
            <p class="text-muted small mb-0">
              New to the neighborhood platform? <a href="/register.html" class="text-decoration-none fw-medium text-primary">Join & Register</a>
            </p>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/login-view.js"></script>
</body>
</html>
