<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - MarketAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="/index.html">🛒 MarketAI</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="/index.html">Home</a>
        <button class="btn btn-danger btn-sm" id="logout-btn">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="row mb-4 align-items-center">
      <div class="col">
        <h2 class="fw-bold text-dark">My Listings</h2>
        <p class="text-muted">Manage the products you are selling on the marketplace.</p>
      </div>
      <div class="col-auto">
        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addListingModal">
          ➕ Add New Item
        </button>
      </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4" id="user-listings-grid">
      </div>
  </div>

  <div class="modal fade" id="addListingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content border-0 shadow">
        
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-bold" id="modalTitle">Create New Listing</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        
        <form id="listing-form">
          <div class="modal-body">
            <input type="hidden" id="listing-id">
            
            <div class="mb-3">
              <label for="title" class="form-label fw-medium text-secondary small">Item Title</label>
              <input type="text" class="form-control" id="title" required placeholder="e.g. iPhone 13 Pro">
            </div>
            
            <div class="mb-3">
              <label for="price" class="form-label fw-medium text-secondary small">Price ($)</label>
              <input type="number" step="0.01" class="form-control" id="price" required placeholder="0.00">
            </div>

            <div class="mb-3">
              <label for="category" class="form-label fw-medium text-secondary small">Product Category</label>
              <select class="form-select" id="category" required>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="books">Books</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label for="description" class="form-label fw-medium text-secondary small">Description</label>
              <textarea class="form-control" id="description" rows="3" placeholder="Describe your item..."></textarea>
            </div>
            
            <div class="mb-3">
              <label for="item-image-file" class="form-label fw-medium text-secondary small">Product Image File</label>
              <input type="file" class="form-control" id="item-image-file" accept="image/*">
            </div>
          </div>
          
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="save-btn">Publish Item</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/dashboard-view.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
