<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - MarketAI</title>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="/index.html">🛡️ MarketAI Admin Portal</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light btn-sm me-2" href="/index.html">View Shop</a>
        <a class="btn btn-outline-light btn-sm me-2" href="/dashboard.html">My Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="card border-0 shadow-sm p-4 mb-4">
      <h2 class="fw-bold text-danger">Global Administration Controls</h2>
      <p class="text-muted">Review, manage, or delete any listing across the entire marketplace platform.</p>
    </div>

    <div class="card border-0 shadow-sm p-4">
      <h4 class="fw-bold text-dark mb-3">All Live Listings</h4>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Price</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-listings-table">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/admin-view.js"></script>
</body>
</html>
