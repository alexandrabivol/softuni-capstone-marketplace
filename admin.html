<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f172a" />
		<meta name="description" content="Admin console for your Bootstrap 5 and Supabase app." />
		<title>app-test | Admin</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
		/>
	</head>
	<body class="bg-body-tertiary">
		<div class="d-flex min-vh-100 flex-column">
			<header class="border-bottom bg-body">
				<nav class="navbar navbar-expand-lg navbar-light bg-body">
					<div class="container py-2">
						<a class="navbar-brand fw-semibold" href="/index.html">app-test</a>
						<button
							class="navbar-toggler"
							type="button"
							data-bs-toggle="collapse"
							data-bs-target="#adminNav"
							aria-controls="adminNav"
							aria-expanded="false"
							aria-label="Toggle navigation"
						>
							<span class="navbar-toggler-icon"></span>
						</button>
						<div class="collapse navbar-collapse" id="adminNav">
							<div class="navbar-nav ms-auto gap-lg-2">
								<a class="nav-link" href="/index.html">Home</a>
								<a class="nav-link" href="/dashboard.html">Dashboard</a>
								<a class="nav-link active" aria-current="page" href="/admin.html">Admin</a>
							</div>
						</div>
					</div>
				</nav>
			</header>

			<main class="flex-grow-1 py-5">
				<section class="container">
					<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
						<div>
							<p class="text-uppercase text-body-secondary small mb-1">Admin console</p>
							<h1 class="h2 fw-semibold mb-0">Manage users and system settings.</h1>
						</div>
						<button class="btn btn-primary" type="button">Create new user</button>
					</div>

					<div class="row g-4 mb-4">
						<div class="col-md-3">
							<div class="card shadow-sm border-0">
								<div class="card-body">
									<p class="text-body-secondary small mb-1">Users</p>
									<h2 class="h3 fw-semibold mb-0">248</h2>
								</div>
							</div>
						</div>
						<div class="col-md-3">
							<div class="card shadow-sm border-0">
								<div class="card-body">
									<p class="text-body-secondary small mb-1">Roles</p>
									<h2 class="h3 fw-semibold mb-0">5</h2>
								</div>
							</div>
						</div>
						<div class="col-md-3">
							<div class="card shadow-sm border-0">
								<div class="card-body">
									<p class="text-body-secondary small mb-1">Alerts</p>
									<h2 class="h3 fw-semibold mb-0">3</h2>
								</div>
							</div>
						</div>
						<div class="col-md-3">
							<div class="card shadow-sm border-0">
								<div class="card-body">
									<p class="text-body-secondary small mb-1">Health</p>
									<h2 class="h3 fw-semibold mb-0">Good</h2>
								</div>
							</div>
						</div>
					</div>

					<div class="card shadow-sm border-0">
						<div class="card-body p-4">
							<h2 class="h5 fw-semibold mb-3">User management</h2>
							<div class="table-responsive">
								<table class="table align-middle mb-0">
									<thead>
										<tr>
											<th scope="col">User</th>
											<th scope="col">Role</th>
											<th scope="col">Access</th>
											<th scope="col">Status</th>
										</tr>
									</thead>
									<tbody>
										<tr>
											<td>Alex Morgan</td>
											<td>Admin</td>
											<td>Full</td>
											<td><span class="badge text-bg-success">Active</span></td>
										</tr>
										<tr>
											<td>Jordan Lee</td>
											<td>Editor</td>
											<td>Limited</td>
											<td><span class="badge text-bg-success">Active</span></td>
										</tr>
										<tr>
											<td>Casey Smith</td>
											<td>Viewer</td>
											<td>Read only</td>
											<td><span class="badge text-bg-warning">Invited</span></td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</section>
			</main>
		</div>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
